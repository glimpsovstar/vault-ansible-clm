---
# Idempotent bootstrap of an httpd CLM target.
# Assumes SOE-style image: httpd already installed, no firewalld.
# This role only writes what's missing or out of date.

- name: Ensure httpd + mod_ssl + openssl + python-cryptography present
  ansible.builtin.dnf:
    name:
      - httpd
      - mod_ssl
      - openssl
      - python3-cryptography
    state: present
  become: true

- name: Ensure cert directory exists with secure mode
  ansible.builtin.file:
    path: "{{ httpd_target_cert_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Generate placeholder self-signed private key (only if missing)
  community.crypto.openssl_privatekey:
    path: "{{ httpd_target_key_path }}"
    size: 2048
    type: RSA
    owner: root
    group: root
    mode: "0600"
  become: true

- name: Generate placeholder CSR
  # No `when:` guard needed -- community.crypto.openssl_csr is idempotent
  # (re-generates only if the existing CSR's params drift).
  community.crypto.openssl_csr:
    path: "{{ httpd_target_cert_dir }}/placeholder.csr"
    privatekey_path: "{{ httpd_target_key_path }}"
    common_name: "{{ ansible_fqdn | default(inventory_hostname) }}"
    country_name: "{{ httpd_target_placeholder_country }}"
    state_or_province_name: "{{ httpd_target_placeholder_state }}"
    locality_name: "{{ httpd_target_placeholder_locality }}"
    organization_name: "{{ httpd_target_placeholder_org }}"
    subject_alt_name:
      - "DNS:{{ ansible_fqdn | default(inventory_hostname) }}"
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Generate placeholder self-signed certificate (only if cert file missing)
  community.crypto.x509_certificate:
    path: "{{ httpd_target_cert_path }}"
    privatekey_path: "{{ httpd_target_key_path }}"
    csr_path: "{{ httpd_target_cert_dir }}/placeholder.csr"
    provider: selfsigned
    selfsigned_not_after: "+{{ httpd_target_placeholder_days }}d"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart httpd

- name: Mirror cert as chain file (placeholder has no real chain)
  ansible.builtin.copy:
    src: "{{ httpd_target_cert_path }}"
    dest: "{{ httpd_target_chain_path }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart httpd

- name: Disable stock /etc/httpd/conf.d/ssl.conf (port 443 conflict)
  ansible.builtin.command:
    cmd: "mv {{ httpd_target_stock_ssl_conf }} {{ httpd_target_stock_ssl_conf }}.disabled"
    removes: "{{ httpd_target_stock_ssl_conf }}"
  become: true
  when: httpd_target_disable_stock_ssl_conf
  notify: Restart httpd

- name: Write CLM vhost config
  ansible.builtin.template:
    src: clm-ssl.conf.j2
    dest: "{{ httpd_target_vhost_file }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart httpd

- name: Write landing page
  ansible.builtin.copy:
    dest: "{{ httpd_target_landing_page }}"
    content: |
      <!doctype html>
      <html><body>
      <h1>CLM httpd target</h1>
      <p>FQDN: {{ ansible_fqdn | default(inventory_hostname) }}</p>
      <p>Cert is replaced by the Vault → AAP CLM workflow.</p>
      </body></html>
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Set SELinux fcontext for /etc/pki/clm (cert_t)
  community.general.sefcontext:
    target: "{{ httpd_target_cert_dir }}(/.*)?"
    setype: cert_t
    state: present
    reload: true
  become: true
  when: ansible_selinux is defined and ansible_selinux.status == "enabled"

- name: Apply SELinux context to cert files
  ansible.builtin.command:
    cmd: "restorecon -Rv {{ httpd_target_cert_dir }}"
  become: true
  when: ansible_selinux is defined and ansible_selinux.status == "enabled"
  changed_when: false

- name: Ensure httpd enabled + running
  ansible.builtin.systemd:
    name: httpd
    state: started
    enabled: true
  become: true

- name: Verify TLS handshake locally
  # Use shell so that `</dev/null` is interpreted as stdin redirect (the command
  # module passes it as a literal argument and openssl rejects).
  ansible.builtin.shell: >
    openssl s_client -connect localhost:{{ httpd_target_vhost_port }}
    -servername {{ ansible_fqdn | default(inventory_hostname) }}
    -verify_quiet </dev/null
  become: true
  changed_when: false
  register: tls_smoke
  retries: 5
  delay: 3
  until: tls_smoke.rc == 0
