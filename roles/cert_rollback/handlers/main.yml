---
# roles/cert_rollback/handlers/main.yml
# Single handler -- dispatcher notifies "reload cert service" regardless of
# cert_service_type; cert_service_name + cert_service_reload_method come from
# the service-specific group_vars (nginx/tomcat/httpd).

- name: reload cert service
  ansible.builtin.systemd:
    name: "{{ cert_service_name }}"
    state: "{{ cert_service_reload_method }}"
  become: true
