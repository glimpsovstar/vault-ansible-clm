---
# roles/cert_deploy/tasks/deploy_tomcat.yml
# Tomcat-specific: fetch keystore password from Vault KV, convert PEM to PKCS12.
# tomcat_keystore_password_kv_path is in the API form "<mount>/data/<path>"
# (e.g. "secret/data/tomcat/keystore") so it can be appended to /v1/ directly.

- name: Vault AppRole login
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/auth/approle/login"
    method: POST
    headers:
      X-Vault-Namespace: "{{ vault_namespace | default('') }}"
    body_format: json
    body:
      role_id: "{{ vault_role_id }}"
      secret_id: "{{ vault_secret_id }}"
    status_code: 200
    validate_certs: false
  register: _vault_login
  delegate_to: localhost
  become: false
  no_log: true

- name: Fetch Tomcat keystore password from Vault KV
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/{{ tomcat_keystore_password_kv_path }}"
    method: GET
    headers:
      X-Vault-Token: "{{ _vault_login.json.auth.client_token }}"
      X-Vault-Namespace: "{{ vault_namespace | default('') }}"
    status_code: 200
    validate_certs: false
  register: _keystore_password_result
  delegate_to: localhost
  become: false
  no_log: true

- name: Set keystore password fact
  ansible.builtin.set_fact:
    _tomcat_keystore_password: "{{ _keystore_password_result.json.data.data[tomcat_keystore_password_kv_key] }}"
  no_log: true

- name: Convert PEM certificate and key to PKCS12 keystore
  community.crypto.openssl_pkcs12:
    action: export
    path: "{{ tomcat_keystore_path }}"
    certificate_path: "{{ cert_dest_cert }}"
    privatekey_path: "{{ cert_dest_key }}"
    other_certificates_parse_all: true
    other_certificates: "{{ cert_dest_chain }}"
    passphrase: "{{ _tomcat_keystore_password }}"
    friendly_name: "{{ vault_cert_common_name }}"
    owner: "{{ cert_owner }}"
    group: "{{ cert_group }}"
    mode: "0600"
    state: present
  notify: reload cert service
  no_log: true
