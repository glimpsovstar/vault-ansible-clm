---
# roles/cert_deploy/handlers/main.yml
# Single handler keyed off cert_service_type -- the dispatcher's notify uses
# the literal string "reload cert service" so the same handler reloads
# nginx, tomcat, httpd, or whatever new service_type is added later.

- name: reload cert service
  ansible.builtin.systemd:
    name: "{{ cert_service_name }}"
    state: "{{ cert_service_reload_method }}"
  become: true
