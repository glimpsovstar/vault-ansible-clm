---
# playbooks/wf_issue.yml
# AAP Workflow Node: Issue certificate from Vault PKI.
# Writes issued cert data to a staging directory on each target host
# so downstream workflow nodes can read it independently per host.

- name: "WF: Issue Certificate"
  hosts: "{{ target_hosts | default('all') }}"
  serial: 1
  gather_facts: true

  tasks:
    - name: Issue certificate from Vault
      ansible.builtin.include_role:
        name: vault_cert_issue

  post_tasks:
    - name: Create certificate staging directory
      ansible.builtin.file:
        path: /tmp/vault_cert_staging
        state: directory
        mode: "0700"
        owner: root
        group: root

    - name: Write issued cert artifacts to staging
      ansible.builtin.copy:
        content: "{{ item.content }}"
        dest: "/tmp/vault_cert_staging/{{ item.name }}"
        mode: "{{ item.mode }}"
      loop:
        - { name: cert.pem, content: "{{ issued_certificate }}", mode: "0644" }
        - { name: key.pem, content: "{{ issued_private_key }}", mode: "0600" }
        - { name: chain.pem, content: "{{ issued_ca_chain }}", mode: "0644" }
        - { name: serial.txt, content: "{{ issued_serial_number }}", mode: "0644" }
      no_log: true
      loop_control:
        label: "{{ item.name }}"
