---
# =============================================================================
# Vault Connection
# =============================================================================
# vault_addr/namespace/role_id/secret_id are injected by the AAP "Vault AppRole
# (CLM)" custom credential type as env vars at job runtime; we look them up
# here so the role's Ansible-var contract continues to work. Workflow survey
# extra_vars (vault_pki_mount, vault_pki_role, vault_cert_ttl) override the
# defaults below.
vault_addr: "{{ lookup('env', 'VAULT_ADDR') }}"
vault_namespace: "{{ lookup('env', 'VAULT_NAMESPACE') | default('admin', true) }}"
vault_auth_method: approle
vault_role_id: "{{ lookup('env', 'VAULT_ROLE_ID') }}"
vault_secret_id: "{{ lookup('env', 'VAULT_SECRET_ID') }}"

# =============================================================================
# PKI Configuration (overridden by workflow survey)
# =============================================================================
vault_pki_mount: pki-demo
vault_pki_role: role-pki-demo
vault_cert_ttl: "720h"  # 30 days; role-pki-demo max_ttl is 72h, clm-demo is 10m
vault_cert_common_name: "{{ inventory_hostname }}"

# =============================================================================
# Certificate Defaults
# =============================================================================
cert_owner: root
cert_group: root
cert_file_mode: "0644"
cert_key_mode: "0600"

# =============================================================================
# Backup Configuration
# =============================================================================
cert_backup_base_path: /opt/cert_backups
cert_backup_retain_count: 5

# =============================================================================
# Monitoring Thresholds
# =============================================================================
cert_expiry_threshold_days: 30

# =============================================================================
# Revocation
# =============================================================================
vault_tidy_after_revoke: false
