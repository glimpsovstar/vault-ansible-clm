---
# Cert destinations for hosts in the db_server group.
#
# In the better-together-vm-lifecycle demo every VM has nginx installed
# (the after_create lifecycle runs install_nginx on all hosts) and a
# default cert_service_type of "nginx", so db_server hosts take the same
# nginx cert paths as web_server. Mirrors group_vars/web_server.yml.

# =============================================================================
# Service Type
# =============================================================================
cert_service_type: nginx

# =============================================================================
# Nginx Certificate Paths
# =============================================================================
cert_dest_dir: /etc/nginx/ssl
cert_dest_cert: "{{ cert_dest_dir }}/{{ vault_cert_common_name }}.crt"
cert_dest_key: "{{ cert_dest_dir }}/{{ vault_cert_common_name }}.key"
cert_dest_chain: "{{ cert_dest_dir }}/{{ vault_cert_common_name }}-chain.crt"
cert_dest_fullchain: "{{ cert_dest_dir }}/{{ vault_cert_common_name }}-fullchain.crt"

# =============================================================================
# Nginx Service Configuration
# =============================================================================
cert_service_name: nginx
cert_service_reload_method: reloaded  # Graceful -- no connection drops

# =============================================================================
# Verification
# =============================================================================
verify_port: 443
